<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My GitHub Pages Site</title>
    <meta name="description" content="GitHub Pagesで公開したシンプルなホームページ" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="hero">
      <p class="eyebrow">GitHub Pages</p>
      <h1>はじめてのホームページ</h1>
      <p class="lead">
        このページはGitHub Pagesで公開するための最小サンプルです。<br />
        テキストと色を変えるだけで、すぐ自分のHPとして使えます。
      </p>
      <a class="button" href="https://github.com" target="_blank" rel="noreferrer">GitHubを開く</a>
    </header>

    <main class="container">
      <section>
        <h2>自己紹介</h2>
        <p>ここにあなたのプロフィールを書いてください。</p>
      </section>

      <section>
        <h2>作ったもの</h2>
        <ul>
          <li>プロジェクトA</li>
          <li>プロジェクトB</li>
          <li>ブログ記事</li>
        </ul>
      </section>

      <section>
        <h2>連絡先</h2>
        <p>メール: your-name@example.com</p>
      </section>
    </main>

    <footer>
      <small>© 2026 Your Name</small>
    </footer>
  </body>
</html>
